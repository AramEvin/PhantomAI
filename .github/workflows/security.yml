name: PhantomAI Security & Build

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master ]

jobs:

  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install detect-secrets

      - name: Scan for hardcoded secrets
        run: |
          detect-secrets scan --all-files > /tmp/secrets.json
          python3 -c "
          import json, sys
          data = json.load(open('/tmp/secrets.json'))
          results = data.get('results', {})
          results = {k: v for k, v in results.items() if '.env.example' not in k and '.env.example' not in k}
          if results:
              for f, secrets in results.items():
                  for s in secrets:
                      print(f'SECRET FOUND: {f} line {s[\"line_number\"]} type={s[\"type\"]}')
              sys.exit(1)
          else:
              print('✓ No secrets detected')
          "

  backend-check:
    name: 🐍 Backend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check core imports
        run: |
          cd backend
          python3 -c "
          import importlib, sys
          modules = ['fastapi', 'uvicorn', 'sqlalchemy', 'asyncpg', 'pydantic', 'loguru', 'httpx']
          failed = []
          for m in modules:
              try:
                  importlib.import_module(m)
                  print(f'  ✓ {m}')
              except ImportError as e:
                  print(f'  ✗ {m}: {e}')
                  failed.append(m)
          if failed:
              sys.exit(1)
          "

      - name: Validate config loads
        env:
          DATABASE_URL: postgresql+asyncpg://phantom:phantom@localhost:5432/phantomdb
          GROQ_API_KEY: test_key_for_ci
        run: |
          cd backend
          python3 -c "from app.core.config import settings; print('✓ Config OK:', settings.APP_NAME)"

  frontend-build:
    name: ⚛️ Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build
        env:
          VITE_API_URL: http://localhost:8000
        run: |
          cd frontend
          npm run build

      - name: Verify build output
        run: |
          test -d frontend/dist && echo "✓ Build successful" || exit 1
