name: PhantomAI Security & Build

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master ]

jobs:

  # ── Job 1: Secret & Dependency Scanning ──────────────
  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for secret scanning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install detect-secrets pip-audit

      - name: Scan for hardcoded secrets
        run: |
          detect-secrets scan --all-files > /tmp/secrets.json
          python3 -c "
          import json, sys
          data = json.load(open('/tmp/secrets.json'))
          results = data.get('results', {})
          # Ignore .env.example files — they are safe templates
          results = {k: v for k, v in results.items() if '.env.example' not in k}
          if results:
              for f, secrets in results.items():
                  for s in secrets:
                      print(f'SECRET FOUND: {f} line {s[\"line_number\"]} type={s[\"type\"]}')
              sys.exit(1)
          else:
              print('✓ No secrets detected')
          "

      - name: Audit Python dependencies
        run: |
          cd backend
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2023-163 || true

      - name: Audit frontend dependencies
        run: |
          cd frontend
          npm audit --audit-level=critical || true

  # ── Job 2: Backend Validation ─────────────────────────
  backend-check:
    name: 🐍 Backend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check all imports resolve
        run: |
          cd backend
          python3 -c "
          import importlib, sys
          modules = [
              'fastapi', 'uvicorn', 'sqlalchemy',
              'asyncpg', 'pydantic', 'loguru',
              'httpx', 'dns.resolver', 'whois'
          ]
          failed = []
          for m in modules:
              try:
                  importlib.import_module(m)
                  print(f'  ✓ {m}')
              except ImportError as e:
                  print(f'  ✗ {m}: {e}')
                  failed.append(m)
          if failed:
              sys.exit(1)
          "

      - name: Validate config loads
        env:
          DATABASE_URL: postgresql+asyncpg://phantom:phantom@localhost:5432/phantomdb
          GROQ_API_KEY: test_key_for_ci
        run: |
          cd backend
          python3 -c "from app.core.config import settings; print('✓ Config OK:', settings.APP_NAME)"

  # ── Job 3: Frontend Build ─────────────────────────────
  frontend-build:
    name: ⚛️ Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit || true

      - name: Build
        env:
          VITE_API_URL: http://localhost:8000
        run: |
          cd frontend
          npm run build

      - name: Check build output exists
        run: |
          test -d frontend/dist && echo "✓ Build successful" || exit 1
