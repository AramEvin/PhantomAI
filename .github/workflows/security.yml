name: 🔐 Security Scan

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  security-scan:
    name: 🔐 Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for real secrets
        run: |
          detect-secrets scan --all-files \
            --exclude-files '\.env$' \
            --exclude-files '\.env\.example$' \
            --exclude-files 'README\.md$' \
            --exclude-files '\.secrets\.baseline$' \
            > /tmp/secrets.json

          python3 -c "
          import json, sys
          data = json.load(open('/tmp/secrets.json'))
          results = data.get('results', {})
          skip_patterns = ['phantom:phantom@localhost', 'user:password@localhost', 'test_key_for_ci', 'your_']
          real_secrets = {}
          for filepath, secrets in results.items():
              try:
                  content = open(filepath).read()
                  if any(p in content for p in skip_patterns):
                      print(f'  ⚪ Skipping {filepath} (example values)')
                      continue
              except:
                  pass
              real_secrets[filepath] = secrets
          if real_secrets:
              for f, secrets in real_secrets.items():
                  for s in secrets:
                      print(f'🚨 SECRET: {f} line {s[\"line_number\"]} type={s[\"type\"]}')
              sys.exit(1)
          else:
              print('✓ No real secrets detected')
          "
