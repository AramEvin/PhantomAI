# ─────────────────────────────────────────────────────────────
# Nginx config for PhantomAI frontend container
# ─────────────────────────────────────────────────────────────

server {
    # Listen on port 80 inside the container
    listen 80;
    server_name localhost;

    # Root directory where built React files live
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression — makes JS/CSS files smaller when sent to browser
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Main location — serve React app
    location / {
        # try_files: first try to serve the exact file,
        # if not found → fall back to index.html
        # WHY: React Router uses client-side routing.
        # Without this, refreshing /history returns 404.
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS, CSS, images) aggressively
    # These have hashed filenames so it's safe to cache forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|avif|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
